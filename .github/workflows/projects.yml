name: Update Top Projects

on:
  schedule:
    - cron: "0 6 * * *" # runs every day at 06:00 UTC (11:30 IST)
  workflow_dispatch:

permissions:
  contents: write

# Shared with snake.yml and 3d-profile.yml so the three README-asset workflows
# queue instead of racing each other's pushes to main.
concurrency:
  group: readme-assets
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the push retry rebases; depth-1 cannot

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate projects table
        env:
          # GH_PAT should be a fine-grained PAT with Repository access: all
          # repositories, Permissions → Repository → Metadata: read-only.
          # Metadata alone is enough — the script reads names, languages, and
          # visibility, never file contents, and never writes.
          #
          # Without GH_PAT this falls back to the repo-scoped token, which sees
          # public commits only: the private block reads zero and the public
          # counts under-report.
          #
          # Org-owned private repos also require the org to allow fine-grained
          # PATs (Org settings → Personal access tokens), and may need per-token
          # approval by an owner.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: node .github/scripts/update-projects.mjs

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "Tables unchanged since last run — nothing to push."
            exit 0
          fi

          git commit -m "chore: refresh top projects table"

          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto latest ${GITHUB_REF_NAME}."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          done

          echo "::error::Could not push the refreshed tables after 3 attempts."
          exit 1
